openapi: 3.0.1
info:
  title: FastTrans API
  version: 1.0.0
servers:
  - url: /
tags:
  - name: auth
    description: Authentication
  - name: transfers
    description: Money transfers
  - name: accounts
    description: Account listing and lookup for the current user
paths:
  /auth/login:
    post:
      tags:
        - auth
      summary: Log in with username/password and receive a bearer token
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LoginResponse"
                  meta:
                    $ref: "#/components/schemas/Meta"
                required:
                  - data
                  - meta
        "400": &a1
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401": &a2
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403": &a3
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404": &a4
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500": &a5
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503": &a6
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /transfers:
    get:
      tags:
        - transfers
      summary: List the current user's transfers, most recent first
      operationId: list
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TransferResponse"
                  meta:
                    $ref: "#/components/schemas/Meta"
                required:
                  - data
                  - meta
        "400": *a1
        "401": *a2
        "403": *a3
        "404": *a4
        "500": *a5
        "503": *a6
    post:
      tags:
        - transfers
      summary: Create a transfer (or idempotent replay)
      operationId: create
      parameters:
        - name: Idempotency-Key
          in: header
          description: Client-generated key; replays return the same transfer
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransferRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CreateTransferResponse"
                  meta:
                    $ref: "#/components/schemas/Meta"
                required:
                  - data
                  - meta
        "400": *a1
        "401": *a2
        "403": *a3
        "404": *a4
        "500": *a5
        "503": *a6
  /transfers/{id}:
    get:
      tags:
        - transfers
      summary: Get a single transfer by id
      operationId: detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TransferResponse"
                  meta:
                    $ref: "#/components/schemas/Meta"
                required:
                  - data
                  - meta
        "400": *a1
        "401": *a2
        "403": *a3
        "404": *a4
        "500": *a5
        "503": *a6
  /accounts:
    get:
      tags:
        - accounts
      summary: List the current user's accounts with balances
      operationId: listAccounts
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccountResponse"
                  meta:
                    $ref: "#/components/schemas/Meta"
                required:
                  - data
                  - meta
        "400": *a1
        "401": *a2
        "403": *a3
        "404": *a4
        "500": *a5
        "503": *a6
  /accounts/{accountRef}:
    get:
      tags:
        - accounts
      summary: Look up an account by its public ref (no balance)
      operationId: lookup
      parameters:
        - name: accountRef
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AccountLookupResponse"
                  meta:
                    $ref: "#/components/schemas/Meta"
                required:
                  - data
                  - meta
        "400": *a1
        "401": *a2
        "403": *a3
        "404": *a4
        "500": *a5
        "503": *a6
components:
  schemas:
    Meta:
      type: object
      properties:
        requestId:
          type: string
          description: Correlation id — equals the current traceId (fallback UUID)
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 UTC instant the response was built
      required:
        - requestId
        - timestamp
    FieldError:
      type: object
      properties:
        field:
          type: string
          description: The request field that failed validation
        message:
          type: string
          description: The validation message for that field
      required:
        - field
        - message
    ErrorBody:
      type: object
      properties:
        code:
          type: string
          enum:
            - VALIDATION_FAILED
            - MISSING_HEADER
            - UNAUTHORIZED
            - ACCOUNT_NOT_FOUND
            - TRANSFER_NOT_FOUND
            - OWNERSHIP_DENIED
            - ACCOUNT_UNAVAILABLE
            - INTERNAL_ERROR
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
          description: Validation failures; omitted when empty
        stackTrace:
          type: string
          description: Populated only when the stacktrace flag is enabled; omitted otherwise
      required:
        - code
        - message
    ErrorResponse:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
        meta:
          $ref: "#/components/schemas/Meta"
      required:
        - error
        - meta
    LoginRequest:
      required:
        - password
        - username
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        expiresIn:
          type: integer
          format: int64
    CreateTransferRequest:
      required:
        - currency
        - fromAccountRef
        - toAccountRef
      type: object
      properties:
        fromAccountRef:
          type: string
        toAccountRef:
          type: string
        amount:
          type: integer
          format: int64
        currency:
          type: string
    CreateTransferResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
    TransferResponse:
      type: object
      properties:
        id:
          type: string
        fromAccountRef:
          type: string
        toAccountRef:
          type: string
        amount:
          type: integer
          format: int64
        currency:
          type: string
        status:
          type: string
        reason:
          type: string
        createdAt:
          type: string
          format: date-time
    AccountResponse:
      type: object
      properties:
        accountRef:
          type: string
        ownerName:
          type: string
        balance:
          type: integer
          format: int64
        currency:
          type: string
    AccountLookupResponse:
      type: object
      properties:
        accountRef:
          type: string
        ownerName:
          type: string
