server:
  port: 8080   # Netty (WebFlux) — only serves actuator health; no REST controller

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/account_db
    username: ${DB_USER:fasttrans}
    password: ${DB_PASSWORD:fasttrans}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}

grpc:
  server:
    port: 9090

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
