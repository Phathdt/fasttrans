server:
  port: 8080

spring:
  application:
    name: transfer-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/transfer_db
    username: ${DB_USER:fasttrans}
    password: ${DB_PASSWORD:fasttrans}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}

# gRPC client — connects to the account service
grpc:
  client:
    account:
      address: static://${ACCOUNT_GRPC_HOST:localhost}:9090
      negotiation-type: plaintext

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
