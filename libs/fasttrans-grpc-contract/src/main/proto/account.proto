syntax = "proto3";

// Single source of truth for the gRPC contract shared between transfer (client)
// and account (server). Built once into the fasttrans-grpc-contract jar; both
// services depend on that jar rather than keeping their own proto copy.
package fasttrans.account.v1;

option java_multiple_files = true;
option java_package = "com.fasttrans.account.grpc";
option java_outer_classname = "AccountProto";

service AccountService {
  // Check whether account_ref belongs to user_id (ownership) before creating a transfer.
  rpc ValidateOwnership(ValidateOwnershipRequest) returns (ValidateOwnershipResponse);
}

message ValidateOwnershipRequest {
  string user_id = 1;
  string account_ref = 2; // public 12-digit value, NOT the internal UUID
}

message ValidateOwnershipResponse {
  bool owned = 1;
}
